name: CI

on:
  pull_request: 
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}   # ensures conda is activated for all steps

    steps:
      # checkout repo
      - uses: actions/checkout@v5

      # create conda env from environment.yml
      - uses: conda-incubator/setup-miniconda@v4
        with:
          environment-file: environment.yml
          auto-activate: false

      # static type checking
      - name: mypy
        run: mypy .

      # lint + complexity + security (replaces pylint, bandit, radon cc)
      - name: ruff check
        run: ruff check 

      # formatting check (replaces autopep8)
      - name: ruff format
        run: ruff format --check 

      # unit tests with coverage. Integration tests only run on local IT infra, not on CI docker.
      - name: pytest with coverage
        run: pytest --cov=src/ --cov-fail-under=80 --without-integration