name: CI

on:
  pull_request: 
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}   # ensures conda is activated for all steps

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          auto-activate-base: false
          cache-environment: true
          cache-environment-key: ${{ runner.os }}-${{ hashFiles('environment.yml') }}

      - name: mypy
        run: mypy src/

      - name: pylint
        run: pylint $(git ls-files '*.py') --fail-under=8.0

      - name: pytest with coverage
        run: pytest --cov=. --cov-fail-under=80 -m "not integration" 