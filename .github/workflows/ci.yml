name: CI

on:
  pull_request: 
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}   # ensures conda is activated for all steps

    steps:
      # checkout repo
      - uses: actions/checkout@v4

      # create + cache conda env
      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          auto-activate-base: false
          cache-environment: true
          cache-environment-key: ${{ runner.os }}-${{ hashFiles('environment.yml') }}

      # static type checking
      - name: mypy
        run: mypy src/

      # lint + complexity + security (replaces pylint, bandit, radon cc)
      - name: ruff check
        run: ruff check src/ tests/

      # formatting check (replaces autopep8)
      - name: ruff format
        run: ruff format --check src/ tests/

      # CVE scan on conda packages
      - name: conda-audit dependency scan
        run: conda-audit -n 035_phenobase

      # unit tests with coverage. Integration tests only run on local IT infra, not on CI docker.
      - name: pytest with coverage
        run: pytest --cov=src/ --cov-fail-under=80 --without-integration